_min_copier_version: "9.0.0"
_subdirectory: template
_preserve_symlinks: true

# License texts are deliberately not vendored here. When a license is chosen,
# this task fetches it from the GitHub Licenses API and writes the LICENSE file.
_tasks:
  - >-
    {% if license != 'none' %}python3 "{{ _copier_conf.src_path }}/scripts/render_license.py"
    --spdx "{{ license }}" --author "{{ author_name }}" --out LICENSE{% else %}true{% endif %}

# ----------------------------------------------------------------------------
# Questions
# ----------------------------------------------------------------------------

project_name:
  type: str
  help: Human-readable name of the project
  default: My Kotlin App

project_group:
  type: str
  help: Maven group / base package (e.g. de.fiereu.myapp)
  default: com.example.app
  validator: >-
    {% if not (project_group | regex_search('^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*$')) %}
    The group must be a valid lowercase, dot-separated package (e.g. de.fiereu.myapp).
    {% endif %}

gradle_version:
  type: str
  help: Which Gradle version should the wrapper use?
  default: "8.14.3"
  validator: >-
    {% if not (gradle_version | regex_search('^\d+\.\d+(\.\d+)?$')) %}
    Enter a Gradle version like 8.14.3 or 9.0.
    {% endif %}

kotlin_version:
  type: str
  help: Which Kotlin version should the version catalog pin?
  default: "2.2.0"

java_version:
  type: int
  help: Which Java toolchain version should Kotlin target?
  default: 21

kotlin_convention:
  type: bool
  help: Add a Kotlin convention plugin in buildSrc (shared Kotlin/toolchain config)?
  default: true

test_framework:
  type: str
  help: Which test framework should the test convention set up?
  choices:
    "None (no test convention)": none
    Kotest: kotest
  default: kotest
  validator: >-
    {% if test_framework != "none" and not kotlin_convention %}
    The test convention builds on the Kotlin convention. Enable the Kotlin convention too.
    {% endif %}

kotest_version:
  type: str
  help: Which Kotest version should the version catalog pin?
  default: "5.9.1"
  when: "{{ test_framework == 'kotest' }}"

spotless_convention:
  type: bool
  help: Add a Spotless convention plugin in buildSrc (ktlint formatting)?
  default: true

spotless_version:
  type: str
  help: Which Spotless plugin version should the version catalog pin?
  default: "8.7.0"
  when: "{{ spotless_convention }}"

sonarlint_convention:
  type: bool
  help: Add a SonarLint convention plugin in buildSrc (remal name.remal.sonarlint)?
  default: true

sonarlint_version:
  type: str
  help: Which remal SonarLint plugin version should the version catalog pin?
  default: "7.1.1"
  when: "{{ sonarlint_convention }}"

agent_instructions:
  type: bool
  help: Generate an AGENTS.md with build/test instructions for AI coding agents?
  default: true

agent_links:
  type: str
  multiselect: true
  help: Which agent tools should get a file linking back to AGENTS.md?
  choices:
    Claude Code (CLAUDE.md): claude
    GitHub Copilot (.github/copilot-instructions.md): copilot
    Gemini CLI (GEMINI.md): gemini
  default:
    - claude
    - copilot
    - gemini
  when: "{{ agent_instructions }}"

license:
  type: str
  help: Which license should the project use? (fetched from the GitHub Licenses API at generation time)
  choices:
    None: none
    MIT: MIT
    Apache-2.0: Apache-2.0
    BSD-3-Clause: BSD-3-Clause
    GPL-3.0: GPL-3.0
    AGPL-3.0: AGPL-3.0
    MPL-2.0: MPL-2.0
  default: MIT

author_name:
  type: str
  help: Copyright holder for the license (blank uses your git user.name)
  default: ""
  when: "{{ license != 'none' }}"

# ----------------------------------------------------------------------------
# Computed values (not asked)
# ----------------------------------------------------------------------------

has_tests:
  type: bool
  when: false
  default: "{{ test_framework != 'none' }}"

use_buildsrc:
  type: bool
  when: false
  default: "{{ kotlin_convention or has_tests or spotless_convention or sonarlint_convention }}"

project_slug:
  type: str
  when: false
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

package_path:
  type: str
  when: false
  default: "{{ project_group | replace('.', '/') }}"
