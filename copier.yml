_min_copier_version: "9.0.0"
_subdirectory: template

# ----------------------------------------------------------------------------
# Questions
# ----------------------------------------------------------------------------

project_name:
  type: str
  help: Human-readable name of the project
  default: My Kotlin App

project_group:
  type: str
  help: Maven group / base package (e.g. de.fiereu.myapp)
  default: com.example.app
  validator: >-
    {% if not (project_group | regex_search('^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*$')) %}
    The group must be a valid lowercase, dot-separated package (e.g. de.fiereu.myapp).
    {% endif %}

gradle_version:
  type: str
  help: Which Gradle version should the wrapper use?
  default: "8.14.3"
  validator: >-
    {% if not (gradle_version | regex_search('^\d+\.\d+(\.\d+)?$')) %}
    Enter a Gradle version like 8.14.3 or 9.0.
    {% endif %}

kotlin_version:
  type: str
  help: Which Kotlin version should the version catalog pin?
  default: "2.2.0"

java_version:
  type: int
  help: Which Java toolchain version should Kotlin target?
  default: 21

kotlin_convention:
  type: bool
  help: Add a Kotlin convention plugin in buildSrc (shared Kotlin/toolchain config)?
  default: true

kotest_convention:
  type: bool
  help: Add a test convention plugin in buildSrc that wires up Kotest?
  default: true
  validator: >-
    {% if kotest_convention and not kotlin_convention %}
    The Kotest test convention builds on the Kotlin convention. Enable the Kotlin convention too.
    {% endif %}

kotest_version:
  type: str
  help: Which Kotest version should the version catalog pin?
  default: "5.9.1"
  when: "{{ kotest_convention }}"

spotless_convention:
  type: bool
  help: Add a Spotless convention plugin in buildSrc (ktlint formatting)?
  default: true

spotless_version:
  type: str
  help: Which Spotless plugin version should the version catalog pin?
  default: "8.7.0"
  when: "{{ spotless_convention }}"

sonarlint_convention:
  type: bool
  help: Add a SonarLint convention plugin in buildSrc (remal name.remal.sonarlint)?
  default: true

sonarlint_version:
  type: str
  help: Which remal SonarLint plugin version should the version catalog pin?
  default: "7.1.1"
  when: "{{ sonarlint_convention }}"

# ----------------------------------------------------------------------------
# Computed values (not asked)
# ----------------------------------------------------------------------------

use_buildsrc:
  type: bool
  when: false
  default: "{{ kotlin_convention or kotest_convention or spotless_convention or sonarlint_convention }}"

project_slug:
  type: str
  when: false
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"

package_path:
  type: str
  when: false
  default: "{{ project_group | replace('.', '/') }}"
